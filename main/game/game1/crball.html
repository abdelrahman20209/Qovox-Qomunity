<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crazy Ball - QOVOX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="hamer.png" type="image/png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050505}
canvas{display:block;position:fixed;inset:0;touch-action:none}
.scanlines{position:fixed;inset:0;z-index:200;pointer-events:none;background:repeating-linear-gradient(to bottom,transparent,transparent 3px,rgba(0,0,0,0.055) 3px,rgba(0,0,0,0.055) 4px)}
#back{position:fixed;top:20px;left:20px;z-index:100;display:flex;align-items:center;gap:8px;background:rgba(139,0,0,0.18);border:1px solid rgba(139,0,0,0.4);padding:9px 18px;border-radius:40px;text-decoration:none;color:rgba(255,255,255,0.6);font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;transition:background .3s,border-color .3s,color .3s,box-shadow .3s}
#back:hover{background:rgba(139,0,0,0.5);border-color:rgba(255,32,32,0.6);color:#fff;box-shadow:0 0 22px rgba(139,0,0,0.4)}
#hud{position:fixed;top:16px;right:24px;z-index:10;text-align:center;pointer-events:none}
#score-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:4px;color:rgba(255,255,255,0.28)}
#score-val{font-family:'Oswald',sans-serif;font-size:54px;font-weight:700;color:#ff2020;line-height:1;text-shadow:0 0 22px rgba(255,32,32,0.8)}
#score-val.bump{animation:scoreBump .18s ease}
@keyframes scoreBump{0%{transform:scale(1)}50%{transform:scale(1.28)}100%{transform:scale(1)}}
#level-tag{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(255,69,0,0.45);margin-top:2px}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,0,0.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:opacity .45s,visibility .45s}
#overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.o-tag{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:5px;color:rgba(255,32,32,0.5);margin-bottom:14px}
.o-title{font-family:'Oswald',sans-serif;font-size:clamp(62px,14vw,112px);font-weight:700;color:#fff;letter-spacing:4px;line-height:.9;text-shadow:0 0 50px rgba(139,0,0,0.45);text-align:center;margin-bottom:10px}
.o-title .r{color:#ff2020;text-shadow:0 0 40px #ff2020,0 0 80px #8b0000}
.o-sub{font-family:'Cairo',sans-serif;font-size:15px;color:rgba(255,255,255,0.38);letter-spacing:1px;text-align:center;max-width:320px;line-height:1.85;margin-bottom:44px}
.death-score{display:none;flex-direction:column;align-items:center;gap:3px;margin-bottom:34px;padding:18px 48px;border:1px solid rgba(139,0,0,0.38);border-radius:6px;background:rgba(139,0,0,0.09)}
.death-score.show{display:flex}
.ds-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:4px;color:rgba(255,255,255,0.28)}
.ds-num{font-family:'Oswald',sans-serif;font-size:76px;font-weight:700;color:#ff2020;line-height:1;text-shadow:0 0 28px #ff2020}
.ds-unit{font-family:'Cairo',sans-serif;font-size:12px;letter-spacing:2px;color:rgba(255,255,255,0.28)}
.play-btn{position:relative;padding:15px 58px;border:1px solid #ff2020;border-radius:3px;background:transparent;color:#fff;font-family:'Cairo',sans-serif;font-size:18px;font-weight:700;letter-spacing:3px;cursor:pointer;overflow:hidden;transition:box-shadow .3s,border-color .3s}
.play-btn::before{content:'';position:absolute;inset:0;background:#8b0000;transform:scaleX(0);transform-origin:right;transition:transform .4s cubic-bezier(.4,0,.2,1);z-index:0}
.play-btn:hover::before{transform:scaleX(1);transform-origin:left}
.play-btn:hover{box-shadow:0 0 38px rgba(139,0,0,0.7);border-color:#ff4500}
.play-btn span{position:relative;z-index:1}
.hint-text{margin-top:18px;font-family:'Cairo',sans-serif;font-size:12px;color:rgba(255,255,255,0.17);letter-spacing:1.5px;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="scanlines"></div>
<a href="../game.html" id="back">ارجع</a>
<div id="hud">
    <div id="score-label">SCORE</div>
    <div id="score-val">0</div>
    <div id="level-tag">LV 1</div>
</div>
<div id="overlay">
    <div class="o-tag">QOVOX</div>
    <div class="o-title">Crazy<br><span class="r">Ball</span></div>
    <div class="o-sub" id="o-sub">تحرك وتجنب الكرات الحمراء<br>كل ثانية بتعيشها = نقطة</div>
    <div class="death-score" id="death-score">
        <span class="ds-label">SCORE</span>
        <span class="ds-num" id="ds-num">0</span>
        <span class="ds-unit">ثانية نجاة</span>
    </div>
    <button class="play-btn" id="play-btn"><span id="btn-label">ابدأ اللعبة</span></button>
    <div class="hint-text" id="hint-text">حرك الماوس او اصبعك لتتجنب الكرات</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreValEl = document.getElementById('score-val');
const levelTagEl = document.getElementById('level-tag');
const overlay = document.getElementById('overlay');
const playBtn = document.getElementById('play-btn');
const oSubEl = document.getElementById('o-sub');
const deathScoreEl = document.getElementById('death-score');
const dsNumEl = document.getElementById('ds-num');
const btnLabelEl = document.getElementById('btn-label');
const hintEl = document.getElementById('hint-text');

let W, H;
let mx = window.innerWidth / 2;
let my = window.innerHeight / 2;
let state = 'start';
let player, enemies, particles;
let startTime, lastSpawn, spawnInterval, prevScore, level, rafId;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); mx = e.touches[0].clientX; my = e.touches[0].clientY; }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); mx = e.touches[0].clientX; my = e.touches[0].clientY; }, { passive: false });

class Player {
    constructor() {
        this.x = W / 2;
        this.y = H / 2;
        this.r = 9;
        this.trail = [];
    }
    update() {
        this.x += (mx - this.x) * 0.13;
        this.y += (my - this.y) * 0.13;
        this.trail.unshift({ x: this.x, y: this.y });
        if (this.trail.length > 28) this.trail.pop();
    }
    draw() {
        for (let i = this.trail.length - 1; i >= 0; i--) {
            const life = 1 - i / this.trail.length;
            ctx.beginPath();
            ctx.arc(this.trail[i].x, this.trail[i].y, this.r * life * 0.72, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,32,32,${life * 0.22})`;
            ctx.fill();
        }
        const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 3.5);
        g.addColorStop(0, 'rgba(255,255,255,0.97)');
        g.addColorStop(0.32, 'rgba(255,140,140,0.55)');
        g.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r * 3.5, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
    }
}

class Enemy {
    constructor(diff) {
        this.r = 6 + Math.random() * 11;
        const spd = (1.6 + Math.random() * 2.5) * diff;
        const side = Math.floor(Math.random() * 4);
        if (side === 0)      { this.x = Math.random() * W; this.y = -this.r - 8; }
        else if (side === 1) { this.x = W + this.r + 8;    this.y = Math.random() * H; }
        else if (side === 2) { this.x = Math.random() * W; this.y = H + this.r + 8; }
        else                 { this.x = -this.r - 8;       this.y = Math.random() * H; }
        const tx = W * (0.2 + Math.random() * 0.6);
        const ty = H * (0.2 + Math.random() * 0.6);
        const angle = Math.atan2(ty - this.y, tx - this.x) + (Math.random() - 0.5) * 0.65;
        this.vx = Math.cos(angle) * spd;
        this.vy = Math.sin(angle) * spd;
        this.pulse = Math.random() * Math.PI * 2;
        this.hue = Math.random() > 0.22 ? 0 : 16;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.pulse += 0.07;
    }
    draw() {
        const f = 0.82 + Math.sin(this.pulse) * 0.18;
        const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 2.2);
        g.addColorStop(0, `hsla(${this.hue},100%,58%,${f})`);
        g.addColorStop(0.55, `hsla(${this.hue},100%,32%,${f * 0.42})`);
        g.addColorStop(1, `hsla(${this.hue},100%,12%,0)`);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r * 2.2, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${this.hue},100%,57%)`;
        ctx.fill();
    }
    offscreen() { return this.x < -100 || this.x > W + 100 || this.y < -100 || this.y > H + 100; }
    hits(p) { return Math.hypot(this.x - p.x, this.y - p.y) < this.r + p.r - 2; }
}

class Particle {
    constructor(x, y) {
        this.x = x; this.y = y;
        const a = Math.random() * Math.PI * 2;
        const s = 1.5 + Math.random() * 8;
        this.vx = Math.cos(a) * s;
        this.vy = Math.sin(a) * s;
        this.life = 1;
        this.decay = 0.012 + Math.random() * 0.022;
        this.r = 2 + Math.random() * 5;
        this.hue = Math.random() > 0.4 ? 0 : 20;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.96; this.vy *= 0.96;
        this.life -= this.decay;
    }
    draw() {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${this.hue},100%,${44 + this.life * 18}%)`;
        ctx.fill();
        ctx.globalAlpha = 1;
    }
    dead() { return this.life <= 0; }
}

function drawBg() {
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, W, H);
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(110,0,0,0.09)';
    const gs = 62;
    for (let x = 0; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    const cg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.65);
    cg.addColorStop(0, 'rgba(85,0,0,0.18)');
    cg.addColorStop(1, 'transparent');
    ctx.fillStyle = cg;
    ctx.fillRect(0, 0, W, H);
}

function drawDanger() {
    if (!player || enemies.length === 0) return;
    let minDist = Infinity;
    for (const e of enemies) minDist = Math.min(minDist, Math.hypot(e.x - player.x, e.y - player.y));
    if (minDist < 150) {
        const intensity = (1 - minDist / 150) * 0.32;
        const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.28, W / 2, H / 2, Math.max(W, H) * 0.72);
        vg.addColorStop(0, 'transparent');
        vg.addColorStop(1, `rgba(200,0,0,${intensity})`);
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, W, H);
    }
}

function explode(x, y) { for (let i = 0; i < 72; i++) particles.push(new Particle(x, y)); }

function gameLoop(ts) {
    rafId = requestAnimationFrame(gameLoop);
    drawBg();
    const elapsed = (ts - startTime) / 1000;
    const s = Math.floor(elapsed);
    level = Math.min(10, Math.floor(elapsed / 8) + 1);
    const diff = 1 + elapsed * 0.055;
    if (s !== prevScore) {
        prevScore = s;
        scoreValEl.textContent = s;
        scoreValEl.classList.remove('bump');
        scoreValEl.offsetWidth;
        scoreValEl.classList.add('bump');
    }
    levelTagEl.textContent = 'LV ' + level;
    if (ts - lastSpawn > spawnInterval) {
        const count = 1 + Math.floor(diff * 0.55);
        for (let i = 0; i < count; i++) enemies.push(new Enemy(diff));
        lastSpawn = ts;
        spawnInterval = Math.max(260, 850 - elapsed * 9.5);
    }
    player.update();
    for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].update();
        enemies[i].draw();
        if (enemies[i].offscreen()) { enemies.splice(i, 1); continue; }
        if (enemies[i].hits(player)) {
            explode(player.x, player.y);
            cancelAnimationFrame(rafId);
            state = 'dead';
            deathLoop();
            showDeath(s);
            return;
        }
    }
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(); particles[i].draw();
        if (particles[i].dead()) particles.splice(i, 1);
    }
    drawDanger();
    player.draw();
}

function deathLoop() {
    drawBg();
    for (const e of enemies) { e.update(); e.draw(); }
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(); particles[i].draw();
        if (particles[i].dead()) particles.splice(i, 1);
    }
    if (particles.length > 0) requestAnimationFrame(deathLoop);
}

function showDeath(s) {
    deathScoreEl.classList.add('show');
    dsNumEl.textContent = s;
    oSubEl.textContent = s >= 30 ? ' أداء خرافي، حاول تكسر رقمك' : s >= 15 ? 'مش بطال، بس تقدر أحسن' : 'حاول تانى وعيش أكتر';
    btnLabelEl.textContent = 'العب تاني';
    hintEl.textContent = s >= 30 ? 'انت جامد' : 'حرك الماوس او اصبعك لتتجنب الكرات';
    setTimeout(() => overlay.classList.remove('hidden'), 360);
}

function startGame() {
    cancelAnimationFrame(rafId);
    mx = W / 2; my = H / 2;
    player = new Player();
    enemies = []; particles = [];
    prevScore = -1; level = 1;
    startTime = performance.now();
    lastSpawn = startTime;
    spawnInterval = 840;
    scoreValEl.textContent = '0';
    levelTagEl.textContent = 'LV 1';
    deathScoreEl.classList.remove('show');
    state = 'playing';
    overlay.classList.add('hidden');
    rafId = requestAnimationFrame(gameLoop);
}

playBtn.addEventListener('click', startGame);
playBtn.addEventListener('touchend', e => { e.preventDefault(); startGame(); });
drawBg();
</script>
</body>
</html>
